<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vendor Check-In â€” Middle School Showcase</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0a1628;
    --gold:   #c9a84c;
    --green:  #38a169;
    --amber:  #d69e2e;
    --red:    #e53e3e;
    --white:  #ffffff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--white);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* â”€â”€ HEADER â”€â”€ */
  .header {
    width: 100%;
    background: var(--navy);
    border-bottom: 2px solid rgba(201,168,76,0.3);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-logo {
    width: 52px;
    height: 52px;
    object-fit: contain;
    mix-blend-mode: screen;
    flex-shrink: 0;
  }
  .header-title {
    text-align: center;
    flex: 1;
    padding: 0 12px;
  }
  .header-title .main { color: var(--gold); font-weight: 800; font-size: 20px; letter-spacing: 0.3px; }
  .header-title .sub  { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px; }

  /* â”€â”€ KIOSK BODY â”€â”€ */
  .kiosk {
    flex: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px 48px;
    gap: 20px;
  }

  .prompt-title { font-size: 20px; font-weight: 700; text-align: center; }
  .prompt-sub   { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; }

  /* â”€â”€ DISPLAY â”€â”€ */
  .display {
    width: 100%;
    padding: 16px 20px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 3px;
    text-align: center;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    color: var(--white);
    font-family: 'Courier New', monospace;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }
  .display.has-input { border-color: var(--gold); }
  .display .placeholder { font-size: 15px; letter-spacing: 1px; color: rgba(255,255,255,0.3); font-family: inherit; }

  /* â”€â”€ KEYPAD â”€â”€ */
  .keypad { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .keypad-row { display: grid; gap: 8px; }
  .keypad-row.letters { grid-template-columns: repeat(4, 1fr); }
  .keypad-row.nums    { grid-template-columns: repeat(3, 1fr); }
  .keypad-row.bottom  { grid-template-columns: repeat(3, 1fr); }

  .key {
    padding: 0;
    height: 58px;
    font-size: 20px;
    font-weight: 600;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--white);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .key:active { background: rgba(255,255,255,0.18); transform: scale(0.96); }
  .key.letter { color: var(--gold); font-size: 17px; font-family: 'Courier New', monospace; }
  .key.utility { background: rgba(255,255,255,0.04); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; color: rgba(255,255,255,0.5); }
  .key.backspace { font-size: 22px; }

  /* â”€â”€ CHECK IN BUTTON â”€â”€ */
  .btn-checkin {
    width: 100%;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.08s;
    margin-top: 4px;
  }
  .btn-checkin:active { opacity: 0.85; transform: scale(0.98); }
  .btn-checkin:disabled { opacity: 0.4; cursor: default; }

  /* â”€â”€ RESULT CARDS â”€â”€ */
  .result-card {
    width: 100%;
    border-radius: 16px;
    padding: 36px 28px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-card.success { background: rgba(56,161,105,0.1);  border: 2px solid var(--green); }
  .result-card.already { background: rgba(214,158,46,0.1); border: 2px solid var(--amber); }
  .result-card.error   { background: rgba(229,62,62,0.1);  border: 2px solid var(--red);   }

  .result-icon { font-size: 52px; line-height: 1; }
  .result-status { font-size: 19px; font-weight: 700; }
  .result-company { font-size: 24px; font-weight: 800; margin-top: 4px; }
  .result-meta { font-size: 14px; color: rgba(255,255,255,0.6); }
  .result-time { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 4px; }
  .result-reset { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 16px; }

  .success .result-status { color: var(--green); }
  .already .result-status { color: var(--amber); }
  .error   .result-status { color: var(--red);   }
  .already .result-time   { color: var(--amber); font-size: 14px; font-weight: 600; }

  /* â”€â”€ SPINNER â”€â”€ */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 3px solid rgba(10,22,40,0.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-hint { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; }
</style>
</head>

<!-- KIOSK -->
<div class="kiosk" id="kioskIdle">
  <div>
    <div class="prompt-title">Enter Your Vendor ID</div>
    <div class="prompt-sub" style="margin-top:4px">Use the keypad or your keyboard</div>
  </div>

  <div class="display" id="display">
    <span class="placeholder" id="displayPlaceholder">e.g. V-001</span>
    <span id="displayValue" style="display:none"></span>
  </div>

  <div class="keypad">
    <div class="keypad-row letters">
      <button class="key letter" onclick="kpPress('V')">V</button>
      <button class="key letter" onclick="kpPress('-')">-</button>
      <button class="key letter" onclick="kpPress('A')">A</button>
      <button class="key letter" onclick="kpPress('B')">B</button>
    </div>
    <div class="keypad-row nums">
      <button class="key" onclick="kpPress('1')">1</button>
      <button class="key" onclick="kpPress('2')">2</button>
      <button class="key" onclick="kpPress('3')">3</button>
    </div>
    <div class="keypad-row nums">
      <button class="key" onclick="kpPress('4')">4</button>
      <button class="key" onclick="kpPress('5')">5</button>
      <button class="key" onclick="kpPress('6')">6</button>
    </div>
    <div class="keypad-row nums">
      <button class="key" onclick="kpPress('7')">7</button>
      <button class="key" onclick="kpPress('8')">8</button>
      <button class="key" onclick="kpPress('9')">9</button>
    </div>
    <div class="keypad-row bottom">
      <button class="key utility" onclick="kpClear()">CLR</button>
      <button class="key" onclick="kpPress('0')">0</button>
      <button class="key utility backspace" onclick="kpBack()">&#9003;</button>
    </div>
  </div>

  <button class="btn-checkin" id="checkInBtn" onclick="doCheckIn()">Check In</button>
  <div class="footer-hint">iPad kiosk &middot; staff use only</div>
</div>

<!-- RESULT (hidden until check-in) -->
<div class="kiosk" id="kioskResult" style="display:none">
  <div class="result-card" id="resultCard">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-status" id="resultStatus"></div>
    <div class="result-company" id="resultCompany"></div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="result-time" id="resultTime"></div>
    <div class="result-reset">Resetting in a moment&hellip;</div>
  </div>
</div>

<script>
  var _input = '';
  var _resetTimer = null;
  var LOGO_SRC = ''; // loaded from SiteContent if set

  // â”€â”€ Keypad â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function kpPress(k) {
    if (_input.length >= 8) return;
    _input += k;
    updateDisplay();
  }
  function kpClear() { _input = ''; updateDisplay(); }
  function kpBack()  { _input = _input.slice(0, -1); updateDisplay(); }

  function updateDisplay() {
    var disp = document.getElementById('display');
    var ph   = document.getElementById('displayPlaceholder');
    var val  = document.getElementById('displayValue');
    if (_input) {
      ph.style.display  = 'none';
      val.style.display = 'inline';
      val.textContent   = _input;
      disp.classList.add('has-input');
    } else {
      ph.style.display  = 'inline';
      val.style.display = 'none';
      disp.classList.remove('has-input');
    }
  }

  // Physical keyboard support
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('kioskIdle').style.display === 'none') return;
    if (e.key === 'Enter')     { doCheckIn(); return; }
    if (e.key === 'Backspace') { kpBack();    return; }
    if (e.key === 'Escape')    { kpClear();   return; }
    var k = e.key.toUpperCase();
    if (/^[A-Z0-9\-]$/.test(k)) kpPress(k);
  });

  // â”€â”€ Check-In â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function doCheckIn() {
    var id = _input.trim();
    if (!id) return;
    var btn = document.getElementById('checkInBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verifying&hellip;';

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.textContent = 'Check In';
        if (!res.success) {
          showResult('error', '', id, '', res.message || 'Vendor ID not found.');
        } else if (res.alreadyCheckedIn) {
          showResult('already', res.companyName, res.vendorId, res.checkInTime, '');
        } else {
          showResult('success', res.companyName, res.vendorId, res.checkInTime, '');
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = 'Check In';
        showResult('error', '', id, '', 'Connection error. Please try again.');
      })
      .checkInVendor(id);
  }

  function showResult(type, company, vendorId, time, msg) {
    document.getElementById('kioskIdle').style.display   = 'none';
    document.getElementById('kioskResult').style.display = 'flex';

    var card = document.getElementById('resultCard');
    card.className = 'result-card ' + type;

    var icons    = { success: '&#10003;', already: '&#33;', error: '&#215;' };
    var statuses = {
      success: 'Checked In!',
      already: 'Already Checked In',
      error:   'Vendor ID Not Found',
    };

    document.getElementById('resultIcon').innerHTML   = icons[type];
    document.getElementById('resultStatus').textContent = statuses[type];
    document.getElementById('resultCompany').textContent = company || vendorId;
    document.getElementById('resultMeta').textContent    = type === 'error' ? (msg || '') : '';
    document.getElementById('resultTime').textContent    =
      type === 'success' ? 'Checked in at ' + time :
      type === 'already' ? 'Previously checked in at ' + time : '';

    if (_resetTimer) clearTimeout(_resetTimer);
    _resetTimer = setTimeout(resetKiosk, 4000);
  }

  function resetKiosk() {
    _input = '';
    updateDisplay();
    document.getElementById('kioskResult').style.display = 'none';
    document.getElementById('kioskIdle').style.display   = 'flex';
  }

  // Branding: CTE logo is hardcoded (base64) directly in the img src attributes above.
</script>
</body>
</html>
