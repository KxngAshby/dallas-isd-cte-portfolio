<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dallas ISD CTE — Esca Kits Admin Portal</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
:root{
  --disd-blue:#003366;
  --disd-blue-hover:#0056b3;
  --sidebar-dark:#0a192f;
  --bg-gray:#f4f6f9;
  --border:#e2e8f0;
  --text:#333333;
  --muted:#64748b;
  /* aliases used by the system guide card */
  --blue:#003366;
  --accent:#0056b3;
  --bg-alt:#f8fafc;
  --bg:var(--bg-gray);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg-gray);color:var(--text);display:flex;min-height:100vh}

/* ── SIDEBAR ── */
aside{width:248px;background:var(--sidebar-dark);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:20}
.brand-section{padding:20px 18px 16px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.08);text-align:center}
.brand-logo-img{display:block;margin:0 auto;max-width:200px;width:100%;height:auto;mix-blend-mode:screen}
.brand-sub{font-size:.68rem;color:#94a3b8;margin-top:8px;letter-spacing:.07em;text-transform:uppercase;font-weight:600}
.nav-links{list-style:none;padding:16px 0;flex-grow:1;overflow-y:auto}
.nav-links li a{display:flex;align-items:center;padding:13px 22px;color:#94a3b8;text-decoration:none;font-weight:500;font-size:.92rem;cursor:pointer;border-left:4px solid transparent;transition:.2s}
.nav-links li a:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-links li.active a{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--disd-blue-hover)}
.nav-links li a i{margin-right:13px;font-size:1.05rem;width:20px;text-align:center}
.sidebar-footer{padding:14px 22px;font-size:.72rem;color:#64748b;border-top:1px solid rgba(255,255,255,.08)}

/* ── MAIN AREA ── */
.app-main{flex-grow:1;margin-left:248px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05);position:sticky;top:0;z-index:10}
.page-title{font-size:1.4rem;color:var(--disd-blue);font-weight:700}
.user-profile{display:flex;align-items:center;gap:10px;font-weight:600;font-size:.9rem;color:var(--muted)}
.user-avatar{width:38px;height:38px;background:var(--disd-blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
main{max-width:1200px;width:100%;margin:0 auto;padding:28px 30px}

.card{background:#fff;border-radius:8px;padding:24px;border:1px solid var(--border);box-shadow:0 4px 6px -1px rgba(0,0,0,.05);margin-bottom:22px}
.card-title{font-size:1.05rem;font-weight:700;margin-bottom:18px;color:var(--disd-blue)}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:24px}
.kpi-card{background:#fff;padding:22px 24px;border-radius:8px;border:1px solid var(--border);box-shadow:0 4px 6px -1px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center}
.kpi-info h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.kpi-info p{font-size:1.85rem;font-weight:700;color:var(--disd-blue);line-height:1}
.kpi-icon{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(0,51,102,.1);color:var(--disd-blue)}
.kpi-green .kpi-icon{background:rgba(21,128,61,.1);color:#15803d}.kpi-green .kpi-info p{color:#15803d}
.kpi-yellow .kpi-icon{background:rgba(161,98,7,.1);color:#a16207}.kpi-yellow .kpi-info p{color:#a16207}
.kpi-red .kpi-icon{background:rgba(197,34,31,.1);color:#c5221f}.kpi-red .kpi-info p{color:#c5221f}
.kpi-teal .kpi-icon{background:rgba(13,148,136,.1);color:#0d9488}.kpi-teal .kpi-info p{color:#0d9488}

/* legacy stat boxes (audit view) */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--bg-gray);border-radius:8px;padding:16px;text-align:center;border:1px solid var(--border)}
.stat .num{font-size:2rem;font-weight:700;line-height:1;color:var(--disd-blue)}
.stat .lbl{font-size:.82rem;color:var(--muted);margin-top:4px}
.stat-green .num{color:#15803d}.stat-yellow .num{color:#a16207}.stat-red .num{color:#c5221f}.stat-blue .num{color:var(--disd-blue)}

/* ── REGIONAL BARS ── */
.region-row{margin-bottom:14px}
.region-head{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:5px}
.region-head strong{color:var(--disd-blue)}
.region-head .meta{color:var(--muted);font-size:.82rem}
.region-bar{background:var(--bg-gray);border-radius:6px;height:22px;overflow:hidden;border:1px solid var(--border)}
.region-bar-fill{background:linear-gradient(90deg,var(--disd-blue),var(--disd-blue-hover));height:100%;border-radius:6px 0 0 6px;min-width:2px;transition:width .4s}

.alert-row{background:#fef9c3;border:1px solid #fbbc04;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:.9rem}
.alert-row strong{color:#a16207}
table{width:100%;border-collapse:collapse;font-size:.92rem}
th{text-align:left;padding:13px 16px;background:#f8fafc;color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
td{padding:14px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f0f7ff}
.badge{display:inline-block;font-size:.78rem;padding:4px 11px;border-radius:50px;font-weight:600}
.badge-avail{background:#dcfce7;color:#15803d}
.badge-needs{background:#fef9c3;color:#a16207}
.badge-dead{background:#fee2e2;color:#c5221f}
.badge-out{background:#dbeafe;color:var(--disd-blue)}
.btn{padding:9px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.88rem;font-weight:600;transition:.2s}
.btn:disabled{opacity:.5;cursor:default}
.btn-primary{background:var(--disd-blue);color:#fff}.btn-primary:hover:not(:disabled){background:var(--disd-blue-hover)}
.btn-success{background:#15803d;color:#fff}.btn-success:hover:not(:disabled){background:#116631}
.btn-warn{background:#a16207;color:#fff}.btn-warn:hover:not(:disabled){background:#854f05}
.btn-danger{background:#c5221f;color:#fff}.btn-danger:hover:not(:disabled){background:#a31b18}
.btn-ghost{background:#fff;color:var(--disd-blue);border:1.5px solid var(--disd-blue)}.btn-ghost:hover:not(:disabled){background:#eef4fb}
.btn-sm{padding:5px 12px;font-size:.8rem}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.86rem;color:#3c4043;margin-bottom:5px;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;background:#fff}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--disd-blue-hover);box-shadow:0 0 0 2px rgba(0,86,179,.15)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.item-line{display:flex;gap:10px;align-items:flex-end;margin-bottom:10px}
.item-line select{flex:1}.item-line input{width:90px}
.action-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.scan-input-row{display:flex;gap:8px;margin-bottom:14px}
.scan-input-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:.93rem}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:.9rem}
.msg-ok{background:#dcfce7;color:#15803d}.msg-err{background:#fee2e2;color:#c5221f}
.spinner-inline{color:var(--muted);font-size:.9rem;padding:8px 0}
@media print{
  aside,.topbar,.no-print{display:none!important}
  .app-main{margin-left:0}
  body{background:#fff;display:block}
  .label-grid{display:flex;flex-wrap:wrap;gap:10px;padding:10px}
  .label-cell{border:1px dashed #ccc;padding:10px;text-align:center;break-inside:avoid;min-width:160px}
  .label-cell small{display:block;font-size:10px;margin-top:4px;color:#333}
}
.label-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px}
.label-cell{border:1px dashed var(--border);border-radius:8px;padding:12px;text-align:center;background:#fafafa}
.label-cell small{display:block;font-size:.78rem;color:var(--muted);margin-top:5px}
.label-cell .kit-label{font-size:.75rem;color:#80868b}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:8px;font-size:.88rem;font-weight:600;color:#fff;opacity:0;transition:.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}.toast-ok{background:#15803d}.toast-err{background:#c5221f}
@media(max-width:720px){
  aside{width:64px}.brand-logo-img,.brand-sub,.nav-links li a span,.sidebar-footer{display:none}
  .nav-links li a{justify-content:center;padding:14px 0}.nav-links li a i{margin-right:0}
  .app-main{margin-left:64px}main{padding:18px}
}
</style>
</head>

function loadDashboard() {
  setMain('<div class="card"><div class="card-title">Dashboard</div><div class="spinner-inline">Loading…</div></div>');

}

function renderDashboard(r, reg) {
  if (!r.success) { setMain(errCard(r.error)); return; }
  var html = '<div class="kpi-grid">';
  html += kpiCard(r.kits_checked_out + ' / ' + r.kits_total, 'Kits Out / Total', 'fa-boxes-stacked', 'kpi-teal');
  html += kpiCard(r.counts.available,        'Available',         'fa-circle-check', 'kpi-green');
  html += kpiCard(r.counts.needs_replacement,'Needs Replacement', 'fa-triangle-exclamation', 'kpi-yellow');
  html += kpiCard(r.counts.dead,             'Dead',              'fa-circle-xmark', 'kpi-red');
  html += '</div>';

  if (reg && reg.success && reg.regions.length) {
    var maxCheckouts = reg.regions.reduce(function(m,x){ return Math.max(m, x.checkouts); }, 0) || 1;
    html += '<div class="card"><div class="card-title">Checkouts by Region</div>';
    html += '<div class="kpi-grid" style="margin-bottom:22px">';
    html += kpiCard(reg.regions_active, 'Regions Active', 'fa-map-location-dot', '');
    html += kpiCard(reg.campuses_total, 'Campuses Registered', 'fa-school', '');
    html += kpiCard(reg.most_active, 'Most Active Region', 'fa-ranking-star', '');
    html += '</div>';
    reg.regions.forEach(function(rg){
      var pct = Math.round((rg.checkouts / maxCheckouts) * 100);
      html += '<div class="region-row">';
      html += '<div class="region-head"><strong>' + esc(rg.region) + '</strong>' +
        '<span class="meta">' + rg.checkouts + ' checkout' + (rg.checkouts===1?'':'s') + ' · ' + rg.open_loans + ' open · ' + rg.campuses_served + ' campus' + (rg.campuses_served===1?'':'es') + '</span></div>';
      html += '<div class="region-bar"><div class="region-bar-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  if (r.alerts.length) {
    html += '<div class="card"><div class="card-title">⚠ Global Reorder Alerts</div>';
    r.alerts.forEach(function(a){
      html += '<div class="alert-row"><strong>' + esc(a.type_name) + '</strong> — ' + a.available + ' available (threshold: ' + a.threshold + ')</div>';
    });
    html += '</div>';
  }

  if (r.careerAlerts && r.careerAlerts.length) {
    html += '<div class="card"><div class="card-title">⚠ Career Kit Reorder Alerts</div>';
    r.careerAlerts.forEach(function(a){
      html += '<div class="alert-row"><strong>' + esc(a.career) + '</strong> — ' + esc(a.type_name) + ': ' + a.available + ' available across ' + a.kit_count + ' kit(s) (threshold: ' + a.threshold + ')</div>';
    });
    html += '</div>';
  }

  if (r.careerSummary && r.careerSummary.length) {
    html += '<div class="card"><div class="card-title">Career Kits</div><table>';

// ── CAMPUS CSV IMPORT — 3-STEP ────────────────────────────────────────────────
var _csvHeaders = [], _csvRows = [], _csvMapping = {}, _csvPreparedRows = [];

// STEP 1: File upload
function showCsvStep1() {
  var html = '<div class="card">' +
    '<div class="card-title"><i class="fa-solid fa-file-arrow-up" style="margin-right:8px"></i>Import Campuses — Step 1 of 3: Upload CSV</div>' +
    '<p style="color:#5f6368;font-size:.9rem;margin-bottom:20px">Upload any CSV export from your district. It can have any number of columns \u2014 you\'ll map the ones you need in the next step. Re-importing is safe: same Org Number = update in place, new Org Number = add, nothing is deleted.</p>' +
    '<div class="form-row"><label>Choose your CSV file</label><input type="file" id="csvFile" accept=".csv,text/csv" style="padding:8px 0"></div>' +
    '<div class="action-row"><button class="btn btn-ghost" onclick="loadCampuses()">Cancel</button>' +
    '<button class="btn btn-primary" onclick="parseCsvFile()"><i class="fa-solid fa-arrow-right"></i> Next: Map Columns</button></div>' +
    '</div>';
  setMain(html);
}

function parseCsvFile() {
  var fileInput = document.getElementById('csvFile');
  if (!fileInput || !fileInput.files.length) { toast('Please select a CSV file.', 'err'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
    if (lines.length < 2) { toast('CSV must have a header row and at least one data row.', 'err'); return; }
    _csvHeaders = parseCsvLine(lines[0]);
    _csvRows = lines.slice(1).map(parseCsvLine);
    showCsvStep2();
  };
  reader.readAsText(fileInput.files[0]);
}

function parseCsvLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  result.push(cur.trim());
  return result;
}

// STEP 2: Column mapping
function showCsvStep2() {
  var FIELDS = [
    { key: 'campus_id',       label: 'Org Number',      required: true  },
    { key: 'name',            label: 'Campus Name',     required: true  },
    { key: 'region',          label: 'Region',          required: false },
    { key: 'principal_name',  label: 'Principal Name',  required: false },
    { key: 'principal_email', label: 'Principal Email', required: false },
  ];
  var HINTS = { campus_id:['org','id','number','num'], name:['name','school','campus'], region:['region','director','area'], principal_name:['principal','admin','head'], principal_email:['email','mail'] };

  var html = '<div class="card">' +
    '<div class="card-title"><i class="fa-solid fa-sliders" style="margin-right:8px"></i>Import Campuses — Step 2 of 3: Map Columns</div>' +
    '<p style="color:#5f6368;font-size:.9rem;margin-bottom:20px">Your CSV has <strong>' + _csvHeaders.length + ' columns</strong> and <strong>' + _csvRows.length + ' rows</strong>. Match each required field to the right column. Fields marked with * are required.</p>';

  html += '<table style="margin-bottom:20px"><tr><th>System Field</th><th>Your CSV Column</th><th>Preview (first row)</th></tr>';
  FIELDS.forEach(function(f) {

function saveEmailSettings() {
  var sig         = (document.getElementById('esDeptSig')     ||{}).value || '';
  var replyTo     = (document.getElementById('esDeptReplyTo') ||{}).value || '';
  var hours       = (document.getElementById('esDeptHours')   ||{}).value || '';
  var thresh      = (document.getElementById('esThreshold')   ||{}).value || '90';
  var ccPrincipal = document.getElementById('esCcPrincipal').checked ? 'true' : 'false';
  var extraCc     = (document.getElementById('esExtraCc')     ||{}).value || '';
  var extraBcc    = (document.getElementById('esExtraBcc')    ||{}).value || '';
  var pending  = 7;
  var hadError = false;
  function done(r) {
    if (r && !r.success) hadError = true;
    if (--pending === 0) {
      if (hadError) toast('Error saving some settings.', 'err');
      else { toast('Settings saved.', 'ok'); _emailSettings.dept_signature = sig; _emailSettings.dept_reply_to = replyTo; _emailSettings.dept_hours = hours; _emailSettings.overdue_threshold_days = thresh; _emailSettings.cc_principal = ccPrincipal; _emailSettings.extra_cc = extraCc; _emailSettings.extra_bcc = extraBcc; }
    }
  }
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('dept_signature', sig);
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('dept_reply_to', replyTo);
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('dept_hours', hours);
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('overdue_threshold_days', thresh);
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('cc_principal', ccPrincipal);
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('extra_cc', extraCc);
  google.script.run.withSuccessHandler(done).withFailureHandler(function(){ hadError=true; done(null); }).saveSetting('extra_bcc', extraBcc);
}

function saveTpl(tplId) {
  var subj = (document.getElementById('tplSubj_' + tplId)||{}).value || '';
  var body = (document.getElementById('tplBody_' + tplId)||{}).value || '';
  google.script.run
    .withSuccessHandler(function(r){
      if (r && r.success) { toast('Template saved.', 'ok'); var t = _emailTemplates.find(function(x){ return x.template_id===tplId; }); if (t){ t.subject=subj; t.body=body; } }
      else toast((r&&r.error)||'Error saving template.', 'err');
    })
    .withFailureHandler(onErr)
    .saveEmailTemplate({ template_id: tplId, subject: subj, body: body });
}

function sendTestEmail(tplId) {
  var replyTo = _emailSettings.dept_reply_to || '';
  if (!replyTo) { toast('Set a Reply-To email in Settings first.', 'err'); return; }
  var subj = (document.getElementById('tplSubj_' + tplId)||{}).value || '(test)';
  var body = (document.getElementById('tplBody_' + tplId)||{}).value || '';
  // Replace all merge fields with placeholder values for the test
  var placeholders = {
    counselorName:'Jane Smith', firstName:'Jane', lastName:'Smith', campusName:'Sample Elementary',
    kitName:'ESCA Kit', career:'Nursing', checkoutDate:'01/15/2026', checkoutMonth:'January',
    returnDate:'05/30/2026', returnDeadline:'05/30/2026', deptHours:'8:00 AM – 4:30 PM, Monday–Friday',
    deptSignature:_emailSettings.dept_signature||'CTE Department, Dallas ISD'
  };
  Object.keys(placeholders).forEach(function(k){ body = body.replace(new RegExp('\\{\\{'+k+'\\}\\}','g'), placeholders[k]); subj = subj.replace(new RegExp('\\{\\{'+k+'\\}\\}','g'), placeholders[k]); });
  // We call saveSetting as a no-op vehicle to send — actually we need a server-side send.
  // Use a dedicated approach: save a temp flag and call a GAS function.
  // For test, we rely on the sendTestEmailServer function.
  google.script.run
    .withSuccessHandler(function(r){
      if (r && r.success) toast('Test email sent to ' + replyTo, 'ok');
      else toast((r&&r.error)||'Error sending test.', 'err');
    })
    .withFailureHandler(onErr)
    .sendTestEmailServer(replyTo, subj, body);
}

function doSendReminder() {
  var deadline = (document.getElementById('rrDeadline')||{}).value || '';
  if (!deadline) { toast('Please select a Return Deadline first.', 'err'); return; }
  var ids = [].slice.call(document.querySelectorAll('.rrRow:checked')).map(function(cb){ return cb.value; });
  if (!ids.length) { toast('No loans selected.', 'err'); return; }
  var res = document.getElementById('rrResult');
  if (res) res.innerHTML = '<div class="spinner-inline"><i class="fa-solid fa-spinner fa-spin"></i> Sending…</div>';
  google.script.run
    .withSuccessHandler(function(r){
      if (res) res.innerHTML = '';
      if (r && r.success) toast('Sent ' + r.sent + ' reminder(s).' + (r.errors&&r.errors.length?' Errors: '+r.errors.length:''), 'ok');
      else toast((r&&r.error)||'Error sending reminders.', 'err');
    })
    .withFailureHandler(function(e){ if(res)res.innerHTML=''; onErr(e); })
    .sendReturnReminder(ids, deadline);
}

function renderLabels(r) {
  if (!r.success) { document.getElementById('labelOutput').innerHTML = errCard(r.error); return; }
  var kit   = r.kit;
  var types = _types;
  var html  = '<div class="card"><div class="card-title no-print">Generated Labels — ' + esc(kit.name) + '</div>';
  html += '<div class="action-row no-print" style="margin-bottom:14px">';
  html += '<button class="btn btn-primary" onclick="window.print()">🖨 Print Labels</button>';
  html += '</div>';

  // Kit case barcode (print on the case itself)
  html += '<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:2px dashed #dadce0">';
  html += '<p style="font-size:.82rem;color:#5f6368;margin-bottom:8px;font-weight:600">KIT CASE LABEL:</p>';
  html += '<div class="label-cell" style="display:inline-block">';
  html += '<svg id="bc_kit"></svg>';
  html += '<small><strong>' + esc(kit.name) + '</strong></small>';
  html += '<small class="kit-label">' + esc(kit.kit_barcode) + '</small>';
  html += '</div></div>';

  // Item barcodes
  html += '<p style="font-size:.82rem;color:#5f6368;margin-bottom:10px;font-weight:600">ITEM LABELS (' + r.created.length + ' total):</p>';
  html += '<div class="label-grid" id="labelGrid">';
  r.created.forEach(function(item, i){
    var t   = types.find(function(x){ return x.type_id === item.type_id; });
    var svgId = 'bc_item_' + i;
    html += '<div class="label-cell"><svg id="' + svgId + '"></svg>' +
      '<small>' + esc(t ? t.name : item.type_id) + '</small>' +
      '<small class="kit-label">' + esc(item.barcode) + '</small>' +
    '</div>';
  });
  html += '</div></div>';
  document.getElementById('labelOutput').innerHTML = html;
  toast('Generated ' + r.created.length + ' barcodes.', 'ok');

  // Render barcodes after DOM is ready
  setTimeout(function() {
    try { JsBarcode('#bc_kit', kit.kit_barcode, { format:'CODE128', width:1.8, height:50, displayValue:false }); } catch(e){}

      try { JsBarcode('#bc_item_' + i, item.barcode, { format:'CODE128', width:1.5, height:44, displayValue:false }); } catch(e){}
    });
  }, 100);
}

function addAuditScan() {
  var inp = document.getElementById('auditScan');

  var el = document.getElementById('auditScanned');
  if (el) el.innerHTML = '<p style="font-size:.88rem;color:#3c4043"><strong>' + _auditScanned.length + '</strong> scanned: ' + _auditScanned.map(esc).join(', ') + '</p>';

    if (!r.success) { document.getElementById('auditResult').innerHTML = errCard(r.error); return; }
    var html = '<div class="card"><div class="card-title">Audit Results</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">';
    html += statBox(r.expected, 'Expected', '');
    html += statBox(r.found,    'Scanned',  r.found >= r.expected ? 'stat-green' : 'stat-yellow');
    html += statBox(r.missing.length, 'Missing', r.missing.length ? 'stat-red' : 'stat-green');
    html += '</div>';
    if (r.missing.length) {
      html += '<p style="font-weight:600;margin-bottom:8px;color:#c5221f">Missing Items:</p><table>';
      html += '<tr><th>Barcode</th><th>Type</th><th>Last Status</th></tr>';
      r.missing.forEach(function(m){ html += '<tr><td>' + esc(m.barcode) + '</td><td>' + esc(m.type_id) + '</td><td>' + esc(m.status) + '</td></tr>'; });
      html += '</table>';
    }
    if (r.unexpected.length) {
      html += '<p style="font-weight:600;margin:12px 0 8px;color:#a05c00">Unexpected Scans (not in this kit):</p>';
      html += '<p style="font-size:.88rem">' + r.unexpected.map(esc).join(', ') + '</p>';
    }
    if (!r.missing.length && !r.unexpected.length) html += '<div class="msg msg-ok">✓ All items accounted for.</div>';
    html += '</div>';
    document.getElementById('auditResult').innerHTML = html;
  }).withFailureHandler(onErr).runAudit(kitId, _auditScanned);
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function loadSettings() {
  setMain('<div class="card"><div class="card-title">Settings</div><div class="spinner-inline">Loading…</div></div>');
  google.script.run.withSuccessHandler(function(r){
    if (!r.success) { setMain(errCard(r.error)); return; }
    var settings = {};
    (r.settings||[]).forEach(function(s){ settings[s.key] = s.value; });
    var urlC = settings.url_counselor || '';
    var urlA = settings.url_admin     || '';
    var html = '<div class="card"><div class="card-title">App Links</div>';
    html += '<p style="font-size:.88rem;color:#5f6368;margin-bottom:14px">Share the Counselor Hub link with counselors. Use the Admin link yourself (or any ESCA staff with access).</p>';
    html += '<div class="form-row"><label>Counselor Hub <span style="color:#1e8e3e;font-size:.8rem">&#x25CF; share this with counselors</span></label>';
    html += '<div style="display:flex;gap:8px;align-items:center">';
    html += '<input readonly value="' + esc(urlC) + '" style="flex:1;background:#f8f9fa;color:#202124" onclick="this.select()">';
    html += '<a href="' + esc(urlC) + '" target="_blank" class="btn btn-ghost btn-sm" style="white-space:nowrap">Open ↗</a>';
    html += '<button class="btn btn-ghost btn-sm" onclick="copyUrl(\'' + esc(urlC) + '\')">Copy</button></div></div>';
    html += '<div class="form-row"><label>Admin Panel <span style="color:#a05c00;font-size:.8rem">&#x25CF; ESCA staff only</span></label>';
    html += '<div style="display:flex;gap:8px;align-items:center">';
    html += '<input readonly value="' + esc(urlA) + '" style="flex:1;background:#f8f9fa;color:#202124" onclick="this.select()">';
    html += '<a href="' + esc(urlA) + '" target="_blank" class="btn btn-ghost btn-sm" style="white-space:nowrap">Open ↗</a>';
    html += '<button class="btn btn-ghost btn-sm" onclick="copyUrl(\'' + esc(urlA) + '\')">Copy</button></div></div>';
    html += '</div>';
    html += '<div class="card" style="margin-top:4px"><div class="card-title">Settings</div>';
    html += '<div class="form-row"><label>Barcode Prefix</label><input id="sPfx" value="' + esc(settings.barcode_prefix||'ESCA') + '" placeholder="ESCA"></div>';
    html += '<div class="form-row"><label>Allowlist <span style="color:#80868b;font-weight:400">(comma-separated emails — leave blank to allow all domain users)</span></label>';
    html += '<input id="sAllow" value="' + esc(settings.allowlist||'') + '" placeholder="user@district.org, user2@district.org"></div>';
    html += '<div class="action-row"><button class="btn btn-primary" onclick="doSaveSettings()">Save Settings</button></div></div>';
    html += '<div class="card" style="margin-top:4px"><div class="card-title">Database Setup</div>';
    html += '<p style="font-size:.9rem;color:#5f6368;margin-bottom:14px">Run this once after initial deploy, and anytime you need to repair the Sheet structure. Safe to re-run — never deletes data.</p>';
    html += '<button class="btn btn-warn" onclick="doSetup()">Run Schema Bootstrap</button>';
    html += '<div id="setupMsg"></div></div>';
    setMain(html);
  }).withFailureHandler(onErr).getSettings();
}

function doSaveSettings() {
  var pfx   = document.getElementById('sPfx').value.trim();
  var allow = document.getElementById('sAllow').value.trim();
  if (!pfx) { toast('Prefix cannot be empty.', 'err'); return; }
  google.script.run.withSuccessHandler(function(r1){
    google.script.run.withSuccessHandler(function(r2){
      if (r2.success) toast('Settings saved.', 'ok'); else toast(r2.error, 'err');
    }).withFailureHandler(onErr).saveSetting('allowlist', allow);
  }).withFailureHandler(onErr).saveSetting('barcode_prefix', pfx);
}

function doSetup() {
  document.getElementById('setupMsg').innerHTML = '<p class="spinner-inline" style="margin-top:8px">Running…</p>';
  google.script.run.withSuccessHandler(function(r){
    var el = document.getElementById('setupMsg');
    if (el) el.innerHTML = '<div class="msg ' + (r.success?'msg-ok':'msg-err') + '" style="margin-top:10px">' + esc(r.message||r.error) + '</div>';
    if (r.success) toast('Schema ready.', 'ok');
  }).withFailureHandler(onErr).runSetup();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setMain(html) { document.getElementById('main').innerHTML = html; }
function copyUrl(url) {
  if (!url) { toast('URL not set — run Schema Bootstrap first.', 'err'); return; }
  navigator.clipboard.writeText(url).then(function(){ toast('Link copied to clipboard.', 'ok'); }).catch(function(){ toast('Copy failed — click the field and use Ctrl+C.', 'err'); });
}

function statBox(num, label, cls) {
  return '<div class="stat ' + cls + '"><div class="num">' + num + '</div><div class="lbl">' + label + '</div></div>';
}

function kpiCard(num, label, icon, cls) {
  return '<div class="kpi-card ' + (cls||'') + '">' +
    '<div class="kpi-info"><h3>' + label + '</h3><p>' + num + '</p></div>' +
    '<div class="kpi-icon"><i class="fa-solid ' + icon + '"></i></div></div>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString(); } catch(e){ return iso; }
}

function errCard(msg) {
  return '<div class="card"><div class="msg msg-err">✗ ' + esc(msg) + '</div></div>';
}

function onErr(e) { toast(e && (e.message || String(e)) || 'Unknown error', 'err'); }

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast ' + (type === 'ok' ? 'toast-ok' : 'toast-err') + ' show';
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.classList.remove('show'); }, 3200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function loadUserInfo() {
  google.script.run.withSuccessHandler(function(r){
    if (r && r.success) {
      var av = document.getElementById('userAvatar');
      var lb = document.getElementById('userLabel');
      if (av) av.textContent = r.initial;
      if (lb && r.email) lb.textContent = r.email;
    }
  }).withFailureHandler(function(){}).getUserInfo();
}

window.onload = function() { loadUserInfo(); showTab('dashboard'); };
